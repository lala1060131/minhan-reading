var done=JSON.parse(localStorage.getItem('u6done')||'[]');
var current=null,answered=[];
function init(){
  var g=document.getElementById('articleGrid');g.innerHTML='';
  articles.forEach(function(a){
    var b=document.createElement('button');
    b.className='article-btn'+(done.indexOf(a.id)>=0?' done':'');
    b.innerHTML='<span class="art-num">第'+a.id+'篇</span>'+a.title;
    b.onclick=(function(id){return function(){openArticle(id);};})(a.id);
    g.appendChild(b);
  });updateProgress();
}
function updateProgress(){
  var p=Math.round(done.length/articles.length*100);
  document.getElementById('progressText').textContent=done.length+' / '+articles.length+' 篇完成';
  document.getElementById('progressFill').style.width=p+'%';
}
function openArticle(id){
  current=null;for(var i=0;i<articles.length;i++){if(articles[i].id===id){current=articles[i];break;}}
  answered=[];for(var j=0;j<current.qs.length;j++){answered.push(null);}
  renderReader();
  document.getElementById('listCard').style.display='none';
  document.getElementById('readerCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){
  document.getElementById('readerCard').style.display='none';
  document.getElementById('listCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderReader(){
  var a=current;
  document.getElementById('readerHeaderTitle').textContent='📖 第'+a.id+'篇・'+a.title;
  var lb=['A','B','C','D'];
  var h='<div class="art-title-row"><span class="art-tag">'+a.tag+'</span><span class="art-title">'+a.title+'</span></div><div class="article-text" id="artText"></div>';
  h+='<div class="section-label"><div class="section-line"></div><div class="section-tag">💡 語詞解釋</div><div class="section-line"></div></div><div class="vocab-list">';
  a.vocab.forEach(function(v){h+='<div class="vocab-item"><div class="vocab-word-row"><span class="vocab-word">🔑 '+v.w+'</span><span class="vocab-zy">'+v.zy+'</span><span class="vocab-type">'+v.type+'</span></div><div class="vocab-meaning">'+v.meaning+'</div><div class="vocab-example">✏️ 例：'+v.example+'</div></div>';});
  h+='</div><div class="section-label"><div class="section-line"></div><div class="section-tag">✏️ 閱讀動動腦</div><div class="section-line"></div></div><div class="quiz-wrap">';
  a.qs.forEach(function(q,qi){
    h+='<div class="q-block"><span class="q-num">第 '+(qi+1)+' 題</span><div class="q-text">'+q.q+'</div><div class="options">';
    q.opts.forEach(function(o,oi){h+='<button class="opt-btn" id="opt_'+qi+'_'+oi+'" onclick="pick('+qi+','+oi+')"><span class="opt-dot">'+lb[oi]+'</span><span>'+o+'</span></button>';});
    h+='</div><div class="exp-box" id="exp'+qi+'">💡 '+q.exp+'</div></div>';
  });
  h+='<button class="submit-btn" id="submitBtn" onclick="submitQuiz()">📋 交出答案！</button><div class="score-box" id="scoreBox"><div class="score-emoji" id="scoreEmoji"></div><div class="score-main" id="scoreMain"></div><div class="score-sub" id="scoreSub"></div><button class="next-btn" onclick="goBack()">← 選其他文章</button></div></div>';
  document.getElementById('readerBody').innerHTML=h;
  var td=document.getElementById('artText'),ls=document.createElement('span');
  a.text.forEach(function(item){
    if(item.c==='\n'){td.appendChild(ls);td.appendChild(document.createElement('br'));ls=document.createElement('span');}
    else if(!item.z){ls.appendChild(document.createTextNode(item.c));}
    else{var r=document.createElement('ruby');r.appendChild(document.createTextNode(item.c));var rt=document.createElement('rt');rt.textContent=item.z;r.appendChild(rt);ls.appendChild(r);}
  });td.appendChild(ls);
}
function pick(qi,oi){
  if(answered[qi]!==null)return;answered[qi]=oi;
  for(var i=0;i<4;i++){var b=document.getElementById('opt_'+qi+'_'+i);if(b){b.disabled=true;if(i===oi){b.style.background='#FFF9C4';b.style.borderColor='#FFD600';}}}
}
function submitQuiz(){
  var u=0;for(var k=0;k<answered.length;k++){if(answered[k]===null)u++;}
  if(u>0){alert('還有 '+u+' 題沒有回答喔！');return;}
  var s=0;
  for(var qi=0;qi<current.qs.length;qi++){
    var q=current.qs[qi],ua=parseInt(answered[qi]),ca=parseInt(q.ans);
    if(ua===ca)s++;
    for(var i=0;i<4;i++){var b=document.getElementById('opt_'+qi+'_'+i);if(!b)continue;b.disabled=true;b.style.background='';b.style.borderColor='';
      if(i===ca&&i===ua){b.className='opt-btn correct';}else if(i===ua&&i!==ca){b.className='opt-btn wrong';}else if(i===ca){b.className='opt-btn show-ans';}else{b.className='opt-btn';}}
    var e=document.getElementById('exp'+qi);if(e)e.style.display='block';
  }
  document.getElementById('submitBtn').style.display='none';
  var sb=document.getElementById('scoreBox');sb.style.display='block';
  var p=Math.round(s/current.qs.length*100),emoji,main,sub;
  if(p===100){emoji='🏆';main='滿分！'+current.qs.length+'題全對！';sub='旻翰超厲害，真的讀懂了！';}
  else if(p>=67){emoji='🌟';main='答對 '+s+' / '+current.qs.length+' 題！';sub='很棒！再複習一下錯的題目吧！';}
  else{emoji='📚';main='答對 '+s+' / '+current.qs.length+' 題';sub='再讀一遍課文，你可以更好的！';}
  document.getElementById('scoreEmoji').textContent=emoji;document.getElementById('scoreMain').textContent=main;document.getElementById('scoreSub').textContent=sub;
  if(done.indexOf(current.id)<0){done.push(current.id);localStorage.setItem('u6done',JSON.stringify(done));}
  updateProgress();sb.scrollIntoView({behavior:'smooth',block:'center'});
}
init();
</script>
