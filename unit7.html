<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旻翰閱讀小教室｜單元7 學校生活</title>
<style>
  :root {
    --main: #F5A623;
    --dark: #D4820A;
    --light: #FFF3DC;
    --accent: #FF6B35;
    --bg: #FFFBF3;
    --card: #FFFFFF;
    --text: #3D2B00;
    --muted: #8B6914;
    --correct: #4CAF50;
    --wrong: #E53935;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', '微軟正黑體', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, #F5A623 0%, #FF6B35 60%, #E84E0F 100%);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(245,166,35,0.3);
  }
  .site-header .emoji { font-size: 2.6rem; display: block; margin-bottom: 6px; }
  .site-header h1 { font-size: 1.7rem; color: #fff; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .site-header p { color: #FFE9C0; font-size: 0.9rem; margin-top: 4px; }

  /* PROGRESS */
  .progressWrap { padding: 18px 20px 8px; max-width: 700px; margin: 0 auto; }
  .progressLabel { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .progressBar { background: #FDDEA0; border-radius: 99px; height: 12px; overflow: hidden; }
  .progressFill { background: linear-gradient(90deg, #F5A623, #FF6B35); height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  /* LIST VIEW */
  #listView { max-width: 700px; margin: 0 auto; padding: 10px 16px 40px; }
  .sectionTitle { font-size: 0.8rem; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin: 18px 0 10px; }
  .articleGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .listCard {
    background: var(--card);
    border: 2px solid #FDDEA0;
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
  }
  .listCard:hover { border-color: var(--main); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,166,35,0.2); }
  .listCard .num { font-size: 0.7rem; color: var(--muted); font-weight: 700; }
  .listCard .title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-top: 4px; line-height: 1.4; }
  .listCard .badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 0.65rem; padding: 2px 6px; border-radius: 99px;
    font-weight: 700;
  }
  .listCard.done { border-color: var(--correct); background: #F0FFF4; }
  .listCard.done .badge { background: var(--correct); color: #fff; }
  .listCard.undone .badge { background: #FFE082; color: #7A5500; }

  /* READER VIEW */
  #readerView { display: none; max-width: 700px; margin: 0 auto; padding: 10px 16px 60px; }
  .backBtn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--main); color: #fff; border: none; border-radius: 99px;
    padding: 8px 18px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    margin-bottom: 16px; transition: background 0.2s;
  }
  .backBtn:hover { background: var(--dark); }
  .readerCard {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: 0 4px 20px rgba(245,166,35,0.12);
    border: 2px solid #FDDEA0;
    margin-bottom: 16px;
  }
  .articleTitle { font-size: 1.3rem; font-weight: 900; color: var(--accent); margin-bottom: 16px; text-align: center; }
  .articleBody { font-size: 1.1rem; line-height: 2.8; color: var(--text); }
  ruby { ruby-align: center; }
  rt { font-size: 0.5em; color: var(--muted); letter-spacing: 0.5px; }

  /* VOCAB */
  .vocabSection { margin-top: 20px; }
  .vocabTitle { font-size: 0.85rem; font-weight: 700; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }
  .vocabCard {
    background: var(--light);
    border-left: 4px solid var(--main);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .vocabWord { font-weight: 900; color: var(--accent); font-size: 1rem; }
  .vocabType { font-size: 0.7rem; background: var(--main); color: #fff; border-radius: 99px; padding: 1px 7px; margin-left: 6px; vertical-align: middle; }
  .vocabZy { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .vocabMeaning { font-size: 0.9rem; color: var(--text); margin-top: 4px; }
  .vocabExample { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-style: italic; }

  /* QUIZ */
  .quizSection { margin-top: 20px; }
  .quizTitle { font-size: 0.85rem; font-weight: 700; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }
  .quizCard {
    background: var(--card);
    border: 2px solid #FDDEA0;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .quizQ { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 12px; line-height: 1.6; }
  .quizOpts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .optBtn {
    background: var(--light);
    border: 2px solid #FDDEA0;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    line-height: 1.4;
  }
  .optBtn:hover:not(:disabled) { border-color: var(--main); background: #FFF3DC; }
  .optBtn.correct { background: #E8F5E9; border-color: var(--correct); color: #1B5E20; }
  .optBtn.wrong { background: #FFEBEE; border-color: var(--wrong); color: #B71C1C; }
  .optBtn:disabled { cursor: default; }
  .explanation {
    display: none; margin-top: 10px;
    background: #FFF8E1; border-radius: 8px; padding: 10px 12px;
    font-size: 0.88rem; color: #6D4C00; border-left: 3px solid var(--main);
  }

  /* COMPLETION */
  .completionBanner {
    display: none; text-align: center;
    background: linear-gradient(135deg, #F5A623, #FF6B35);
    color: #fff; border-radius: var(--radius);
    padding: 24px; margin-top: 16px;
    font-size: 1.1rem; font-weight: 700;
  }
  .completionBanner .big { font-size: 2rem; display: block; margin-bottom: 8px; }

  @media (max-width: 480px) {
    .articleGrid { grid-template-columns: repeat(2, 1fr); }
    .quizOpts { grid-template-columns: 1fr; }
    .site-header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="site-header">
  <span class="emoji">🏫</span>
  <h1>單元七・學校生活</h1>
  <p>旻翰閱讀小教室｜20篇文章等你來挑戰！</p>
</div>

<div class="progressWrap">

  <div class="progressBar"><div class="progressFill" id="progressFill" style="width:0%"></div></div>

// State
let doneSets = {};
let quizAnswered = {};

function loadProgress() {
  ARTICLES.forEach(a => {
    const key = 'uNdone_u7_' + a.id;
    const val = localStorage.getItem(key);
    doneSets[a.id] = (val === 'done');
  });
}

function saveProgress(id) {
  localStorage.setItem('uNdone_u7_' + id, 'done');
  doneSets[id] = true;
}

function updateProgress() {
  const done = Object.values(doneSets).filter(Boolean).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('progressFill').style.width = (done / 20 * 100) + '%';
}

function renderList() {
  const grid = document.getElementById('articleGrid');
  grid.innerHTML = '';
  ARTICLES.forEach(a => {
    const isDone = doneSets[a.id];
    const card = document.createElement('div');
    card.className = 'listCard ' + (isDone ? 'done' : 'undone');
    card.innerHTML = `
      <div class="num">第 ${a.id} 篇</div>
      <div class="title">${a.title}</div>
      <span class="badge">${isDone ? '✓ 完成' : '待讀'}</span>
    `;
    card.onclick = () => showArticle(a.id);
    grid.appendChild(card);
  });
}

function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('readerView').style.display = 'none';
  renderList();
  updateProgress();
}

      <div class="quizTitle">🧠 閱讀測驗</div>
      ${a.quiz.map((q, qi) => `
        <div class="quizCard" id="qcard_${id}_${qi}">
          <div class="quizQ">${qi + 1}. ${q.q}</div>
          <div class="quizOpts">
            ${q.opts.map((opt, oi) => `
              <button class="optBtn" onclick="answerQ(${id}, ${qi}, ${oi})" id="opt_${id}_${qi}_${oi}">
                ${'ABCD'[oi]}. ${opt}
              </button>
            `).join('')}
          </div>
          <div class="explanation" id="exp_${id}_${qi}">💡 ${q.exp}</div>
        </div>
      `).join('')}
    </div>
    <div class="completionBanner" id="banner_${id}">
      <span class="big">🎉</span>
      恭喜旻翰完成第 ${id} 篇！<br>繼續加油！
    </div>
  `;
  document.getElementById('articleContent').innerHTML = html;
  window.scrollTo(0, 0);
}

function answerQ(artId, qi, oi) {
  if (quizAnswered[qi]) return;
  quizAnswered[qi] = true;

  const a = ARTICLES.find(x => x.id === artId);
  const correct = a.quiz[qi].ans;
  const opts = document.querySelectorAll(`#qcard_${artId}_${qi} .optBtn`);
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  });
  document.getElementById(`exp_${artId}_${qi}`).style.display = 'block';

  // Check all answered
  const allAnswered = a.quiz.every((_, i) => quizAnswered[i]);
  if (allAnswered) {
    document.getElementById(`banner_${artId}`).style.display = 'block';
    saveProgress(artId);
    updateProgress();
    setTimeout(() => {
      document.getElementById(`banner_${artId}`).scrollIntoView({ behavior: 'smooth' });
    }, 200);
  }
}

// Init
loadProgress();
renderList();
updateProgress();
</script>
</body>
</html>
