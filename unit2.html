*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#FFF5F5;min-height:100vh;padding:16px}
.header{max-width:820px;margin:0 auto 18px;background:linear-gradient(135deg,#E91E63,#F48FB1);border-radius:20px;padding:18px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 18px rgba(233,30,99,.3)}
.header-emoji{font-size:2.8rem}
.header-title{color:#fff;font-size:1.5rem;font-weight:900;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.15)}
.header-sub{color:rgba(255,255,255,.85);font-size:.85rem;margin-top:3px}
.unit-badge{display:inline-block;background:#fff;color:#880E4F;font-weight:700;font-size:.8rem;padding:3px 12px;border-radius:20px;margin-top:6px}
.list-card{max-width:820px;margin:0 auto 16px;background:#fff;border-radius:18px;box-shadow:0 3px 16px rgba(0,0,0,.07);overflow:hidden}
.list-header{background:linear-gradient(90deg,#C2185B,#F06292);padding:14px 22px;display:flex;align-items:center;gap:10px}
.list-header span{color:#fff;font-size:1.05rem;font-weight:700}
.article-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px}
.article-btn{background:#FCE4EC;border:2px solid #F48FB1;border-radius:12px;padding:12px 6px;font-size:.9rem;font-weight:700;color:#880E4F;cursor:pointer;transition:all .18s;font-family:'Noto Sans TC',sans-serif;text-align:center;line-height:1.4}
.article-btn:hover{background:#E91E63;color:#fff;border-color:#E91E63;transform:translateY(-2px);box-shadow:0 4px 12px rgba(233,30,99,.3)}
.article-btn.done{background:#C8E6C9;border-color:#66BB6A;color:#2E7D32}
.article-btn .art-num{font-size:.7rem;font-weight:500;opacity:.7;display:block}
.reader-card{max-width:820px;margin:0 auto 16px;background:#fff;border-radius:18px;box-shadow:0 3px 16px rgba(0,0,0,.07);overflow:hidden;display:none}
.reader-header{background:linear-gradient(90deg,#C2185B,#F06292);padding:14px 22px;display:flex;align-items:center;justify-content:space-between}
.reader-header-left{display:flex;align-items:center;gap:10px}
.reader-header span{color:#fff;font-size:1.05rem;font-weight:700}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;font-weight:700;transition:background .2s}
.back-btn:hover{background:rgba(255,255,255,.35)}
.reader-body{padding:22px 26px}
.art-title-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:3px dashed #F48FB1}
.art-tag{background:#E91E63;color:#fff;font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.art-title{font-size:1.25rem;font-weight:900;color:#880E4F}
.article-text{line-height:3.4;font-size:1.05rem;color:#333;margin-bottom:18px}
ruby{display:inline-flex;flex-direction:column-reverse;align-items:center;vertical-align:bottom}
rt{font-size:.55em;color:#C2185B;font-weight:500;line-height:1;letter-spacing:.3px;text-align:center;margin-bottom:1px}
.section-label{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
.section-line{flex:1;height:2px;background:#F48FB1;border-radius:2px}
.section-tag{background:#C2185B;color:#fff;font-size:.85rem;font-weight:700;padding:4px 14px;border-radius:20px;white-space:nowrap}
.vocab-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.vocab-item{background:#E8F5E9;border-left:4px solid #43A047;border-radius:0 12px 12px 0;padding:12px 16px}
.vocab-word-row{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.vocab-word{font-size:1.05rem;font-weight:900;color:#1B5E20}
.vocab-zy{font-size:.8rem;color:#C2185B;font-weight:600}
.vocab-type{font-size:.72rem;background:#A5D6A7;color:#1B5E20;padding:1px 7px;border-radius:10px;font-weight:700}
.vocab-meaning{font-size:.9rem;color:#2E7D32;line-height:1.6;font-weight:500}
.vocab-example{font-size:.82rem;color:#555;margin-top:4px;padding-top:4px;border-top:1px dashed #A5D6A7;line-height:1.5}
.quiz-wrap{margin-top:4px}
.q-block{background:#FFF8E1;border:2px solid #FFD54F;border-radius:14px;padding:16px 18px;margin-bottom:14px}
.q-num{display:inline-block;background:#FF8F00;color:#fff;font-weight:700;font-size:.8rem;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.q-text{font-size:.98rem;font-weight:700;color:#333;line-height:1.7;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:7px}
.opt-btn{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #E0E0E0;border-radius:11px;padding:9px 13px;font-size:.93rem;color:#333;cursor:pointer;transition:all .18s;font-family:'Noto Sans TC',sans-serif;text-align:left;line-height:1.5;width:100%}
.opt-btn:hover:not(:disabled){border-color:#FFB300;background:#FFF8E1}
.opt-btn:disabled{cursor:default}
.opt-dot{width:26px;height:26px;border-radius:50%;background:#F5F5F5;border:2px solid #DDD;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:#666}
.opt-btn.correct{border-color:#43A047!important;background:#E8F5E9!important;color:#1B5E20!important}
.opt-btn.correct .opt-dot{background:#43A047;border-color:#43A047;color:#fff}
.opt-btn.wrong{border-color:#E53935!important;background:#FFEBEE!important;color:#B71C1C!important}
.opt-btn.wrong .opt-dot{background:#E53935;border-color:#E53935;color:#fff}
.opt-btn.show-ans{border-color:#43A047!important;background:#E8F5E9!important;color:#1B5E20!important}
.opt-btn.show-ans .opt-dot{background:#43A047;border-color:#43A047;color:#fff}
.exp-box{display:none;margin-top:9px;padding:9px 13px;background:#E3F2FD;border-radius:9px;font-size:.85rem;color:#1565C0;line-height:1.6}
.submit-btn{width:100%;background:linear-gradient(135deg,#E91E63,#F06292);color:#fff;border:none;border-radius:13px;padding:14px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:4px;transition:all .2s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(233,30,99,.35)}
.score-box{display:none;text-align:center;padding:24px 16px;border-top:2px dashed #F48FB1;margin-top:16px}
.score-emoji{font-size:3.2rem;margin-bottom:10px}
.score-main{font-size:1.4rem;font-weight:900;color:#C2185B;margin-bottom:6px}
.score-sub{font-size:.95rem;color:#666;margin-bottom:20px}
.next-btn{background:linear-gradient(135deg,#E91E63,#F06292);color:#fff;border:none;border-radius:13px;padding:12px 28px;font-size:.98rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin:4px;transition:all .2s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(233,30,99,.35)}
.progress-bar-wrap{max-width:820px;margin:0 auto 14px;background:#fff;border-radius:14px;padding:12px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.progress-label{font-size:.85rem;color:#C2185B;font-weight:700;margin-bottom:6px}
.progress-track{height:10px;background:#FCE4EC;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#E91E63,#F06292);border-radius:10px;transition:width .5s}
@media(max-width:520px){
  .article-grid{grid-template-columns:repeat(3,1fr)}
  .reader-body{padding:14px 14px}
  .article-text{font-size:.98rem;line-height:3.2}
}

var done=JSON.parse(localStorage.getItem('u2done')||'[]');
var current=null;
var answered=[];

function init(){
  var grid=document.getElementById('articleGrid');
  grid.innerHTML='';
  articles.forEach(function(a){
    var btn=document.createElement('button');
    btn.className='article-btn'+(done.indexOf(a.id)>=0?' done':'');
    btn.innerHTML='<span class="art-num">第'+a.id+'篇</span>'+a.title;
    btn.onclick=(function(id){return function(){openArticle(id);};})(a.id);
    grid.appendChild(btn);
  });
  updateProgress();
}

function updateProgress(){
  var pct=Math.round(done.length/articles.length*100);
  document.getElementById('progressText').textContent=done.length+' / '+articles.length+' 篇完成';
  document.getElementById('progressFill').style.width=pct+'%';
}

function openArticle(id){
  current=null;
  for(var i=0;i<articles.length;i++){if(articles[i].id===id){current=articles[i];break;}}
  answered=[];
  for(var j=0;j<current.qs.length;j++){answered.push(null);}
  renderReader();
  document.getElementById('listCard').style.display='none';
  document.getElementById('readerCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('readerCard').style.display='none';
  document.getElementById('listCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderReader(){
  var a=current;
  document.getElementById('readerHeaderTitle').textContent='📖 第'+a.id+'篇・'+a.title;
  var labels=['A','B','C','D'];
  var html='<div class="art-title-row"><span class="art-tag">'+a.tag+'</span><span class="art-title">'+a.title+'</span></div><div class="article-text" id="artText"></div>';
  html+='<div class="section-label"><div class="section-line"></div><div class="section-tag">💡 語詞解釋</div><div class="section-line"></div></div><div class="vocab-list">';
  a.vocab.forEach(function(v){
    html+='<div class="vocab-item"><div class="vocab-word-row"><span class="vocab-word">🔑 '+v.w+'</span><span class="vocab-zy">'+v.zy+'</span><span class="vocab-type">'+v.type+'</span></div><div class="vocab-meaning">'+v.meaning+'</div><div class="vocab-example">✏️ 例：'+v.example+'</div></div>';
  });
  html+='</div><div class="section-label"><div class="section-line"></div><div class="section-tag">✏️ 閱讀動動腦</div><div class="section-line"></div></div><div class="quiz-wrap">';
  a.qs.forEach(function(q,qi){
    html+='<div class="q-block" id="qb'+qi+'"><span class="q-num">第 '+(qi+1)+' 題</span><div class="q-text">'+q.q+'</div><div class="options">';
    q.opts.forEach(function(opt,oi){
      html+='<button class="opt-btn" id="opt_'+qi+'_'+oi+'" onclick="pick('+qi+','+oi+')"><span class="opt-dot">'+labels[oi]+'</span><span>'+opt+'</span></button>';
    });
    html+='</div><div class="exp-box" id="exp'+qi+'">💡 '+q.exp+'</div></div>';
  });
  html+='<button class="submit-btn" id="submitBtn" onclick="submitQuiz()">📋 交出答案！</button><div class="score-box" id="scoreBox"><div class="score-emoji" id="scoreEmoji"></div><div class="score-main" id="scoreMain"></div><div class="score-sub" id="scoreSub"></div><button class="next-btn" onclick="goBack()">← 選其他文章</button></div></div>';
  document.getElementById('readerBody').innerHTML=html;

  var textDiv=document.getElementById('artText');
  var lineSpan=document.createElement('span');
  a.text.forEach(function(item){
    if(item.c==='\n'){
      textDiv.appendChild(lineSpan);
      textDiv.appendChild(document.createElement('br'));
      lineSpan=document.createElement('span');
    } else if(!item.z){
      lineSpan.appendChild(document.createTextNode(item.c));
    } else {
      var ruby=document.createElement('ruby');
      ruby.appendChild(document.createTextNode(item.c));
      var rt=document.createElement('rt');
      rt.textContent=item.z;
      ruby.appendChild(rt);
      lineSpan.appendChild(ruby);
    }
  });
  textDiv.appendChild(lineSpan);
}

function pick(qi,oi){
  if(answered[qi]!==null)return;
  answered[qi]=oi;
  for(var i=0;i<4;i++){
    var b=document.getElementById('opt_'+qi+'_'+i);
    if(b){
      b.disabled=true;
      if(i===oi){b.style.background='#FFF9C4';b.style.borderColor='#FFD600';}
    }
  }
}

function submitQuiz(){
  var unanswered=0;
  for(var k=0;k<answered.length;k++){if(answered[k]===null)unanswered++;}
  if(unanswered>0){alert('還有 '+unanswered+' 題沒有回答喔！');return;}
  var score=0;
  for(var qi=0;qi<current.qs.length;qi++){
    var q=current.qs[qi];
    var ua=parseInt(answered[qi]);
    var ca=parseInt(q.ans);
    if(ua===ca){score++;}
    for(var i=0;i<4;i++){
      var b=document.getElementById('opt_'+qi+'_'+i);
      if(!b)continue;
      b.disabled=true;
      b.style.background='';
      b.style.borderColor='';
      if(i===ca&&i===ua){b.className='opt-btn correct';}
      else if(i===ua&&i!==ca){b.className='opt-btn wrong';}
      else if(i===ca){b.className='opt-btn show-ans';}
      else{b.className='opt-btn';}
    }
    var expEl=document.getElementById('exp'+qi);
    if(expEl)expEl.style.display='block';
  }
  document.getElementById('submitBtn').style.display='none';
  var sb=document.getElementById('scoreBox');
  sb.style.display='block';
  var pct=Math.round(score/current.qs.length*100);
  var emoji,main,sub;
  if(pct===100){emoji='🏆';main='滿分！'+current.qs.length+'題全對！';sub='旻翰超厲害，真的讀懂了！';}
  else if(pct>=67){emoji='🌟';main='答對 '+score+' / '+current.qs.length+' 題！';sub='很棒！再複習一下錯的題目吧！';}
  else{emoji='📚';main='答對 '+score+' / '+current.qs.length+' 題';sub='再讀一遍課文，你可以更好的！';}
  document.getElementById('scoreEmoji').textContent=emoji;
  document.getElementById('scoreMain').textContent=main;
  document.getElementById('scoreSub').textContent=sub;
  if(done.indexOf(current.id)<0){done.push(current.id);localStorage.setItem('u2done',JSON.stringify(done));}
  updateProgress();
  sb.scrollIntoView({behavior:'smooth',block:'center'});
}

init();
</script>
</body>
</html>
