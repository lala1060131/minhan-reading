var done=JSON.parse(localStorage.getItem('u4done')||'[]');
var current=null;
var answered=[];

function init(){
  var grid=document.getElementById('articleGrid');
  grid.innerHTML='';
  articles.forEach(function(a){
    var btn=document.createElement('button');
    btn.className='article-btn'+(done.indexOf(a.id)>=0?' done':'');
    btn.innerHTML='<span class="art-num">第'+a.id+'篇</span>'+a.title;
    btn.onclick=(function(id){return function(){openArticle(id);};})(a.id);
    grid.appendChild(btn);
  });
  updateProgress();
}

function updateProgress(){
  var pct=Math.round(done.length/articles.length*100);
  document.getElementById('progressText').textContent=done.length+' / '+articles.length+' 篇完成';
  document.getElementById('progressFill').style.width=pct+'%';
}

function openArticle(id){
  current=null;
  for(var i=0;i<articles.length;i++){if(articles[i].id===id){current=articles[i];break;}}
  answered=[];
  for(var j=0;j<current.qs.length;j++){answered.push(null);}
  renderReader();
  document.getElementById('listCard').style.display='none';
  document.getElementById('readerCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('readerCard').style.display='none';
  document.getElementById('listCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderReader(){
  var a=current;
  document.getElementById('readerHeaderTitle').textContent='📖 第'+a.id+'篇・'+a.title;
  var labels=['A','B','C','D'];
  var html='<div class="art-title-row"><span class="art-tag">'+a.tag+'</span><span class="art-title">'+a.title+'</span></div><div class="article-text" id="artText"></div>';
  html+='<div class="section-label"><div class="section-line"></div><div class="section-tag">💡 語詞解釋</div><div class="section-line"></div></div><div class="vocab-list">';
  a.vocab.forEach(function(v){
    html+='<div class="vocab-item"><div class="vocab-word-row"><span class="vocab-word">🔑 '+v.w+'</span><span class="vocab-zy">'+v.zy+'</span><span class="vocab-type">'+v.type+'</span></div><div class="vocab-meaning">'+v.meaning+'</div><div class="vocab-example">✏️ 例：'+v.example+'</div></div>';
  });
  html+='</div><div class="section-label"><div class="section-line"></div><div class="section-tag">✏️ 閱讀動動腦</div><div class="section-line"></div></div><div class="quiz-wrap">';
  a.qs.forEach(function(q,qi){
    html+='<div class="q-block" id="qb'+qi+'"><span class="q-num">第 '+(qi+1)+' 題</span><div class="q-text">'+q.q+'</div><div class="options">';
    q.opts.forEach(function(opt,oi){
      html+='<button class="opt-btn" id="opt_'+qi+'_'+oi+'" onclick="pick('+qi+','+oi+')"><span class="opt-dot">'+labels[oi]+'</span><span>'+opt+'</span></button>';
    });
    html+='</div><div class="exp-box" id="exp'+qi+'">💡 '+q.exp+'</div></div>';
  });
  html+='<button class="submit-btn" id="submitBtn" onclick="submitQuiz()">📋 交出答案！</button><div class="score-box" id="scoreBox"><div class="score-emoji" id="scoreEmoji"></div><div class="score-main" id="scoreMain"></div><div class="score-sub" id="scoreSub"></div><button class="next-btn" onclick="goBack()">← 選其他文章</button></div></div>';
  document.getElementById('readerBody').innerHTML=html;

  var textDiv=document.getElementById('artText');
  var lineSpan=document.createElement('span');
  a.text.forEach(function(item){
    if(item.c==='\n'){
      textDiv.appendChild(lineSpan);
      textDiv.appendChild(document.createElement('br'));
      lineSpan=document.createElement('span');
    } else if(!item.z){
      lineSpan.appendChild(document.createTextNode(item.c));
    } else {
      var ruby=document.createElement('ruby');
      ruby.appendChild(document.createTextNode(item.c));
      var rt=document.createElement('rt');
      rt.textContent=item.z;
      ruby.appendChild(rt);
      lineSpan.appendChild(ruby);
    }
  });
  textDiv.appendChild(lineSpan);
}

function pick(qi,oi){
  if(answered[qi]!==null)return;
  answered[qi]=oi;
  for(var i=0;i<4;i++){
    var b=document.getElementById('opt_'+qi+'_'+i);
    if(b){b.disabled=true;if(i===oi){b.style.background='#FFF9C4';b.style.borderColor='#FFD600';}}
  }
}

function submitQuiz(){
  var unanswered=0;
  for(var k=0;k<answered.length;k++){if(answered[k]===null)unanswered++;}
  if(unanswered>0){alert('還有 '+unanswered+' 題沒有回答喔！');return;}
  var score=0;
  for(var qi=0;qi<current.qs.length;qi++){
    var q=current.qs[qi];
    var ua=parseInt(answered[qi]);
    var ca=parseInt(q.ans);
    if(ua===ca){score++;}
    for(var i=0;i<4;i++){
      var b=document.getElementById('opt_'+qi+'_'+i);
      if(!b)continue;
      b.disabled=true;b.style.background='';b.style.borderColor='';
      if(i===ca&&i===ua){b.className='opt-btn correct';}
      else if(i===ua&&i!==ca){b.className='opt-btn wrong';}
      else if(i===ca){b.className='opt-btn show-ans';}
      else{b.className='opt-btn';}
    }
    var expEl=document.getElementById('exp'+qi);
    if(expEl)expEl.style.display='block';
  }
  document.getElementById('submitBtn').style.display='none';
  var sb=document.getElementById('scoreBox');
  sb.style.display='block';
  var pct=Math.round(score/current.qs.length*100);
  var emoji,main,sub;
  if(pct===100){emoji='🏆';main='滿分！'+current.qs.length+'題全對！';sub='旻翰超厲害，真的讀懂了！';}
  else if(pct>=67){emoji='🌟';main='答對 '+score+' / '+current.qs.length+' 題！';sub='很棒！再複習一下錯的題目吧！';}
  else{emoji='📚';main='答對 '+score+' / '+current.qs.length+' 題';sub='再讀一遍課文，你可以更好的！';}
  document.getElementById('scoreEmoji').textContent=emoji;
  document.getElementById('scoreMain').textContent=main;
  document.getElementById('scoreSub').textContent=sub;
  if(done.indexOf(current.id)<0){done.push(current.id);localStorage.setItem('u4done',JSON.stringify(done));}
  updateProgress();
  sb.scrollIntoView({behavior:'smooth',block:'center'});
}

init();
</script>
